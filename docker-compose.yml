services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: solis
      POSTGRES_PASSWORD: solis
      POSTGRES_DB: solis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solis -d solis"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./backend
      target: dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URI: postgresql://solis:solis@postgres:5432/solis
      PAYLOAD_SECRET: dev-secret-changez-en-production
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
      NODE_ENV: development
    volumes:
      - ./backend:/app
      - web_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  web_node_modules:
