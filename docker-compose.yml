services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: SOLISS
      POSTGRES_PASSWORD: SOLISS
      POSTGRES_DB: SOLISS
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U SOLISS -d SOLISS"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./backend
      target: dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URI: postgresql://SOLISS:SOLISS@postgres:5432/SOLISS
      PAYLOAD_SECRET: dev-secret-changez-en-production
      NEXT_PUBLIC_SERVER_URL: https://hybrid-hertz-stowing.ngrok-free.dev
      NODE_ENV: development
    volumes:
      - ./backend:/app
      - web_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  web_node_modules:
